server:
  port: 8080

spring:
  application:
    name: smart-sales-control
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smart_sales_control?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:30MB}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.sellinghouses.salescontrol.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.sellinghouses.salescontrol.module: debug

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: selling-houses-smart-sales-control-secret-2026
  expiration-minutes: 180

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:}
    public-url-prefix: ${ALIYUN_OSS_PUBLIC_URL_PREFIX:}
    upload-dir: ${ALIYUN_OSS_UPLOAD_DIR:selling-houses}
    max-size-mb: ${ALIYUN_OSS_MAX_SIZE_MB:5}
